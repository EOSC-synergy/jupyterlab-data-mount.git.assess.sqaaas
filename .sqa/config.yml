        commands:
        - /usr/bin/env sh .sqa/script.ruby_insightful_lobster.sh
        container: qc.sty_malachite_smart_mongoose
      github.com/jsc-jupyter/jupyterlab-data-mount jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.ash_wise_owl.sh
        container: qc.sty_teal_mysterious_cassowary
  QC.Uni:
